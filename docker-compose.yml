version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: parkingmanagement-db
    environment:
      SA_PASSWORD: "YourSuperStrongPassword123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - parkingmanagement-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourSuperStrongPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ASP.NET Core Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parkingmanagement-app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__constr=Server=sqlserver,1433;Database=db60267;User Id=sa;Password=YourSuperStrongPassword123!;Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=True;
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - parkingmanagement-network
    volumes:
      - ./wwwroot:/app/wwwroot
    restart: unless-stopped

networks:
  parkingmanagement-network:
    driver: bridge

volumes:
  sqlserver_data:
    driver: local
